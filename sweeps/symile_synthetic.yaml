# sweep.yaml
program: /sc-projects/sc-proj-ukb-cvd/projects/sigmile-paper/code_cleanup/main.py
project: sigmile
name: Symile (gate) - 500k Synthetic XNOR (p=1.0/1.0) - K=512, B=512
method: bayes
metric:
  name: val/max_acc_top1
  goal: maximize

parameters:
  # Dataset experiments
  encoders.n_bits:
    values: [16]
  encoders.p_flips:
    values: [[0.00,0.00]]
  encoders.p_corrs:
    values: [[0.0, 1.0, 1.0]]
  encoders.corr_modes:
    values: ["swap_signal"]
  encoders.signal_scale:
    values: [1.0]
  encoders.distractor_std:
    values: [3.0]
  encoders.bc_corr_exclusive:
    values: [true]
  encoders.bc_corr_split:
    values: [0.5]
  encoders.a_rule:
    values: ["xnor"]
  encoders.embed_mode:
    values: ["u_v_uv"]
  # Symile params
  modelname.logit_scale_init:  # 2.3025851
    min: -3
    max: 0
    distribution: uniform
  # Gate parameters
  modelname.gate_strength_init:
    min: -1
    max: 6
    distribution: uniform
  modelname.neutral_type:
    values: ["random_trainable"]
  modelname.gate_mode:
    values: ["attention"]
  modelname.use_gate:
    values: [True]
  modelname.gate_type:
    values: ["sigmoid"]
  modelname.gate_temp:
    min: 0.2
    max: 1.2
    distribution: uniform
  optimizer.lr_gate_mul:
    min: 1.0
    max: 20.0
    distribution: "log_uniform_values"
  modelname.gate_d_k:
    values: [256]
  # Embeddings
  modelname.emb_dim:
    values: [256]
  modelname.embedding_norm:
    values: [True]
  # Optimizer
  optimizer.lr:
    min: 0.00001
    max: 0.01
    distribution: "log_uniform_values"
  optimizer.warmup_steps:
    values: [0, 100, 200]
  optimizer.weight_decay:
    values: [0, 0.1, 0.01, 0.001]


command:
  - ${env}
  - torchrun
  - --standalone
  - --nproc_per_node=1
  - ${program}
  - --config-name=config
  - modelname="symile"
  - modelname.negative_sampling="pair"
  - dataset_name="synthetic_xor"
  - encoders="synthetic_xor"
  - wandb.group="None"
  - batch_size=512
  - modelname.pair_num_negatives=512
  - encoders.n_samples=500000
  - devices=1
  - ${args_no_hyphens}