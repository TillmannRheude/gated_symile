# sweep.yaml
program: /sc-projects/sc-proj-ukb-cvd/projects/sigmile-paper/code_cleanup/main.py
project: sigmile
name: Clip - Mimic
method: bayes
metric:
  name: val/max_acc_top1
  goal: maximize

parameters:
  modelname.logit_scale_init:  # 2.3025851
    min: -3
    max: 0
    distribution: uniform
  # Embeddings
  modelname.emb_dim:
    values: [1024]
  modelname.embedding_norm:
    values: [True]
  # Optimizer
  optimizer.lr:
    min: 0.00001
    max: 0.01
    distribution: "log_uniform_values"
  optimizer.warmup_steps:
    values: [200, 500, 1000, 1200]
  optimizer.weight_decay:
    values: [0, 0.1, 0.01, 0.001]


command:
  - ${env}
  - torchrun 
  - --standalone
  - --nproc_per_node=1
  - ${program}
  - --config-name=config
  - modelname="clip"
  - dataset_name="symile_mimic"
  - encoders="symile_mimic"
  - wandb.group="None"
  - batch_size=280
  - devices=1
  - ${args_no_hyphens}
