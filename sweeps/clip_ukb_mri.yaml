# sweep.yaml
program: /sc-projects/sc-proj-ukb-cvd/projects/sigmile-paper/code_cleanup/main.py
project: sigmile
name: Clip - UKB (nmr, olink, phenotypes)
method: bayes
metric:
  name: val/max_acc_top1
  goal: maximize

parameters:
  modelname.logit_scale_init:  # 2.3025851
    min: -3
    max: 0
    distribution: "uniform"
  # Gate parameters
  #modelname.gate_mode:
  #  values: ["matrix"]
  modelname.use_gate:
    values: [False]
  #modelname.gate_type:
  #  values: ["softmax"]
  #modelname.gate_temp:
  #  min: 0.01
  #  max: 1.0
  #  distribution: uniform
  #optimizer.lr_gate_mul:
  #  min: 50.0
  #  max: 200.0
  #  distribution: "log_uniform_values"
  #Encoders
  encoders.nmr.mlp.hidden_dims:
    values: [[128,256,512],[256,512,1024],[512,1024,2048]]
  encoders.nmr.mlp.hidden_dropouts:
    values: [[0.0,0.0,0.0],[0.2,0.2,0.2],[0.4,0.4,0.4],[0.6,0.6,0.6]]
  encoders.olink.mlp.hidden_dims:
    values: [[128,256,512],[256,512,1024],[512,1024,2048]]
  encoders.olink.mlp.hidden_dropouts:
    values: [[0.0,0.0,0.0],[0.2,0.2,0.2],[0.4,0.4,0.4],[0.6,0.6,0.6]]
  encoders.mri_brain_phenotypes.mlp.hidden_dims:
    values: [[128,256,512],[256,512,1024],[512,1024,2048]]
  encoders.mri_brain_phenotypes.mlp.hidden_dropouts:
    values: [[0.0,0.0,0.0],[0.2,0.2,0.2],[0.4,0.4,0.4],[0.6,0.6,0.6]]
  #encoders.prs.mlp.hidden_dims:
  #  values: [[256,512,1024],[512,1024,2048],[1024,2048,4096]]
  #encoders.prs.mlp.hidden_dropouts:
  #  values: [[0.0,0.0,0.0],[0.2,0.2,0.2],[0.4,0.4,0.4],[0.6,0.6,0.6]]
  #encoders.mri_brain_phenotypes.mlp.hidden_dims:
  #  values: [[128,256,512],[256,512,1024],[512,1024,2048]]
  #encoders.mri_brain_phenotypes.mlp.hidden_dropouts:
  #  values: [[0.0,0.0,0.0],[0.2,0.2,0.2],[0.4,0.4,0.4],[0.6,0.6,0.6]]
  # Embeddings
  modelname.emb_dim:
    values: [3072, 4096, 6144, 8192]
  modelname.embedding_norm:
    values: [True]
  # Optimizer
  optimizer.lr:
    min: 0.00001
    max: 0.01
    distribution: "log_uniform_values"
  optimizer.warmup_steps:
    values: [0, 10, 100, 200, 500]
  optimizer.weight_decay:
    values: [0.0]


command:
  - ${env}
  - torchrun
  - --standalone
  - --nproc_per_node=1
  - ${program}
  - --config-name=config_debug
  - modelname="clip"
  - wandb.group="None"
  - batch_size=512
  - datamodule.batch_size=512
  - datamodule.combine_eids_as="intersect"
  - patience=5
  - devices=1
  - ${args_no_hyphens}