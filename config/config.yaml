defaults:
  - _self_
  - datamodule: default
  - encoders: synthetic_xnor  # symile_mimic / ukb / synthetic_xnor / mcmed
  - modelname: clip  # clip / symile / triangle / gram / comm / symile_attention

dataset_name: synthetic_xnor  # symile_mimic / ukb / synthetic_xnor / mcmed
batch_size: 128
split_nr: 1
devices: 1

optimizer:
  name: schedulefree_adamw  # 
  lr: 1e-3
  lr_gate_mul: 1.0
  warmup_steps: 0
  weight_decay: 0.0  # 1e-4
  eps: 1e-7
  betas: [0.9, 0.95]

seed: 420

precision: "bf16"
max_epochs: 25
patience: 5
monitor: "val/acc_top1"
monitor_mode: "max"
wandb:
  project: "gatedsymile"
  group: None

ckpt_dir: "checkpoints"
ckpt_name: None  # transformer_symile_ukb