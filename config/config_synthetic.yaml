defaults:
  - _self_
  - encoders: synthetic_xnor 
  - modelname: symile  # clip / symile

dataset_name: synthetic_xnor 
batch_size: 128
split_nr: 1
devices: 1

optimizer:
  name: schedulefree_adamw  # 
  lr: 0.008751964799911622
  lr_gate_mul: 2
  warmup_steps: 200
  weight_decay: 0.0  # 1e-4
  eps: 1e-7
  betas: [0.9, 0.95]

seed: 420

precision: "bf16"
max_epochs: 25
patience: 5
monitor: "val/acc_top1"
monitor_mode: "max"
wandb:
  project: "gatedsymile"
  group: None

ckpt_dir: "checkpoints"
ckpt_name: None